<!-- Header Component -->
<header
  class="sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b border-border"
>
  <div class="container mx-auto px-4 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center space-x-8">
        <div class="flex items-center space-x-2">
          <i class="fas fa-tv text-primary text-2xl"></i>
          <h1 class="text-2xl font-bold text-foreground">GlobalTV</h1>
        </div>

        <!-- Navigation -->
        <nav class="hidden md:flex space-x-6">
          <a
            href="#"
            class="text-foreground hover:text-primary transition-colors font-medium"
            >Home</a
          >
          <a
            href="#"
            class="text-muted-foreground hover:text-primary transition-colors"
            >Live TV</a
          >
          <a
            href="#"
            class="text-muted-foreground hover:text-primary transition-colors"
            >Categories</a
          >
          <a
            href="#"
            class="text-muted-foreground hover:text-primary transition-colors"
            >Favorites</a
          >
        </nav>
      </div>

      <!-- Search and Controls -->
      <div class="flex items-center space-x-4">
        <div class="relative hidden sm:block">
          <i
            class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-muted-foreground"
          ></i>
          <input
            type="search"
            placeholder="Search channels..."
            id="search-input"
            class="w-80 pl-10 pr-4 py-2 bg-input border border-border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
          />
        </div>
        <button class="p-2 hover:bg-muted rounded-lg transition-colors">
          <i class="fas fa-heart text-muted-foreground hover:text-primary"></i>
        </button>
        <button class="p-2 hover:bg-muted rounded-lg transition-colors">
          <i class="fas fa-cog text-muted-foreground hover:text-primary"></i>
        </button>
      </div>
    </div>
  </div>
</header>

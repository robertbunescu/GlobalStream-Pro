<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlobalTV - Watch Live TV Channels Worldwide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            colors: {
              background: "var(--background)",
              foreground: "var(--foreground)",
              card: {
                DEFAULT: "var(--card)",
                foreground: "var(--card-foreground)",
              },
              popover: {
                DEFAULT: "var(--popover)",
                foreground: "var(--popover-foreground)",
              },
              primary: {
                DEFAULT: "var(--primary)",
                foreground: "var(--primary-foreground)",
              },
              secondary: {
                DEFAULT: "var(--secondary)",
                foreground: "var(--secondary-foreground)",
              },
              muted: {
                DEFAULT: "var(--muted)",
                foreground: "var(--muted-foreground)",
              },
              accent: {
                DEFAULT: "var(--accent)",
                foreground: "var(--accent-foreground)",
              },
              destructive: {
                DEFAULT: "var(--destructive)",
                foreground: "var(--destructive-foreground)",
              },
              border: "var(--border)",
              input: "var(--input)",
              ring: "var(--ring)",
            },
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-background text-foreground min-h-screen">
    <!-- Header Component -->
    <div id="header-container"></div>

    <div class="flex">
      <!-- Sidebar Component -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="flex-1 min-h-screen">
        <div class="container mx-auto px-6 py-6">
          <!-- Video Player Component -->
          <div id="video-player-container"></div>

          <!-- Channel Filters Component -->
          <div id="channel-filters-container"></div>

          <!-- Channel Grid Component -->
          <div id="channel-grid-container"></div>

          <!-- Load More Button -->
          <div class="text-center mt-12">
            <button
              class="px-8 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium"
            >
              Load More Channels
            </button>
            <p class="text-sm text-muted-foreground mt-2">
              Showing 10 of 5,247 channels
            </p>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="js/components-loader.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
